<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2563eb">
<title>体力測定</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --primary: #2563eb;
    --danger: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
    --bg: #f1f5f9;
    --surface: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --radius: 14px;
    --nav-h: 64px;
    --header-h: 54px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: var(--nav-h);
  }

  /* ===== LOGIN ===== */
  #loginScreen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #1e3a8a 0%, #2563eb 60%, #38bdf8 100%);
    z-index: 9999; padding: 24px;
  }
  .login-logo { font-size: 24px; font-weight: 700; color: white; margin-bottom: 6px; }
  .login-sub  { color: rgba(255,255,255,.7); font-size: 13px; margin-bottom: 32px; }
  .login-card { background: white; border-radius: 20px; padding: 28px 20px; width: 100%; max-width: 340px; }
  .login-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .login-input {
    width: 100%; padding: 14px 16px; border: 2px solid var(--border);
    border-radius: 12px; font-size: 16px; font-family: inherit;
    outline: none; transition: border-color .2s; margin-bottom: 12px;
  }
  .login-input:focus { border-color: var(--primary); }
  .login-btn {
    width: 100%; padding: 15px; background: var(--primary);
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  .login-btn:active { opacity: .85; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; display: none; }

  /* ===== HEADER ===== */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: white; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--primary); }
  .header-user  { font-size: 12px; color: var(--text-muted); }
  .header-right { display: flex; gap: 6px; }
  .icon-btn {
    height: 36px; padding: 0 12px; border-radius: 8px;
    border: 1.5px solid var(--border); background: white;
    font-size: 12px; font-weight: 500; font-family: inherit;
    cursor: pointer; color: var(--text-muted); white-space: nowrap;
  }
  .icon-btn.danger { border-color: #fecaca; color: var(--danger); }
  .icon-btn:active { opacity: .75; }

  /* ===== MAIN ===== */
  main { margin-top: var(--header-h); padding: 14px; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-h); background: white;
    border-top: 1px solid var(--border);
    display: flex; box-shadow: 0 -2px 10px rgba(0,0,0,.07); z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; border: none; background: none;
    color: var(--text-muted); font-family: inherit;
    font-size: 10px; font-weight: 500;
  }
  .nav-item.active { color: var(--primary); }
  .nav-icon { font-size: 20px; }

  /* ===== SECTIONS ===== */
  .section { display: none; }
  .section.active { display: block; }

  /* ===== CARD ===== */
  .card {
    background: white; border-radius: var(--radius);
    padding: 18px; margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }

  /* ===== FORM ===== */
  .form-group { margin-bottom: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; display: block; }
  .form-input, .form-select {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 16px; font-family: inherit;
    background: white; color: var(--text); outline: none;
    transition: border-color .2s;
    appearance: none; -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--primary); }
  .submit-btn {
    width: 100%; padding: 15px; background: var(--primary); color: white;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:active { opacity: .85; }

  /* ===== 記録カード ===== */
  .event-scroll {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px; margin-bottom: 14px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .event-scroll::-webkit-scrollbar { display: none; }
  .event-chip {
    flex-shrink: 0; padding: 7px 13px;
    background: white; border: 1.5px solid var(--border);
    border-radius: 100px; font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap; color: var(--text-muted);
    font-family: inherit; transition: all .15s;
  }
  .event-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

  .rec-card {
    background: white; border-radius: var(--radius);
    padding: 14px; margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    display: flex; align-items: center; gap: 12px;
  }
  .rec-rank {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; flex-shrink: 0;
  }
  .rank-A { background: #dcfce7; color: #166534; }
  .rank-B { background: #dbeafe; color: #1e40af; }
  .rank-C { background: #fef9c3; color: #854d0e; }
  .rank-D { background: #ffedd5; color: #9a3412; }
  .rank-E { background: #fee2e2; color: #991b1b; }

  .rec-info { flex: 1; min-width: 0; }
  .rec-event { font-size: 14px; font-weight: 600; }
  .rec-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .rec-right { text-align: right; flex-shrink: 0; }
  .rec-value { font-size: 18px; font-weight: 700; color: var(--primary); }
  .rec-unit  { font-size: 11px; color: var(--text-muted); }
  .rec-avg   { font-size: 11px; margin-top: 2px; }
  .rec-del {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1.5px solid #fecaca; background: #fff5f5;
    color: var(--danger); font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .rec-del:active { background: #fee2e2; }
  .empty-msg { text-align: center; padding: 40px 16px; color: var(--text-muted); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }

  /* ===== グラフ ===== */
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .stat-card {
    background: white; border-radius: 12px; padding: 12px;
    text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--primary); }
  .stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .chart-card {
    background: white; border-radius: var(--radius);
    padding: 16px; margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .chart-sub   { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; display:flex; align-items:center; gap:6px; }
  .chart-sel   { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; background: white; appearance: none; -webkit-appearance: none; outline:none; }
  .chart-wrap  { position: relative; height: 220px; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: calc(var(--nav-h) + 12px); left: 14px; right: 14px;
    background: #1e293b; color: white; padding: 13px 18px;
    border-radius: 12px; font-size: 14px; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
    transform: translateY(16px); opacity: 0;
    transition: all .25s; z-index: 9998; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* ===== MODAL ===== */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 500; display: none; align-items: flex-end;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px; width: 100%;
  }
  .modal h3 { font-size: 17px; margin-bottom: 8px; }
  .modal p  { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
  .modal-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-full {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; border: 1.5px solid var(--border); background: white; color: var(--text);
  }
  .btn-full.danger { background: var(--danger); color: white; border-color: var(--danger); }

  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.4); border-top-color: white;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">📈 体力測定</div>
  <p class="login-sub">記録管理システム</p>
  <div class="login-card">
    <div class="form-group">
      <label class="login-label">名前</label>
      <input type="text" id="loginName" class="login-input" placeholder="山田 太郎">
    </div>
    <div class="form-group">
      <label class="login-label">パスワード</label>
      <input type="password" id="loginPw" class="login-input" placeholder="パスワード"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError">名前またはパスワードが違います</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header>
    <div>
      <div class="header-title">📈 体力測定</div>
      <div class="header-user" id="headerUser"></div>
    </div>
    <div class="header-right">
      <button class="icon-btn danger" onclick="confirmReset()">🔄 リセット</button>
      <button class="icon-btn" onclick="doLogout()">🔒 ログアウト</button>
    </div>
  </header>

  <main>

    <!-- 入力 -->
    <div id="sec-input" class="section active">
      <div class="card">
        <div class="card-title">✏️ 新しい記録を追加</div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">性別</label>
            <select id="f-sex" class="form-select">
              <option>男子</option>
              <option>女子</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">年齢</label>
            <select id="f-age" class="form-select">
              <option>20-24歳</option><option>25-29歳</option><option>30-34歳</option>
              <option>35-39歳</option><option>40-44歳</option><option>45-49歳</option>
              <option>50-54歳</option><option>55-59歳</option><option>60-64歳</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">種目</label>
          <select id="f-event" class="form-select">
            <option>50m走</option>
            <option>長座体前屈</option>
            <option>上体起こし</option>
            <option>シャトルラン</option>
            <option>反復横跳び</option>
            <option>立ち幅とび</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">記録</label>
          <input type="number" id="f-record" class="form-input"
            placeholder="例：8.5" step="0.01" inputmode="decimal">
        </div>

        <button class="submit-btn" onclick="addRecord()" id="addBtn">＋ 追加する</button>
      </div>
    </div>

    <!-- 記録一覧 -->
    <div id="sec-list" class="section">
      <div class="event-scroll" id="eventChips"></div>
      <div id="recList"></div>
    </div>

    <!-- グラフ -->
    <div id="sec-chart" class="section">
      <div class="stats-row" id="statsRow"></div>

      <div class="chart-card">
        <div class="chart-title">🕸️ レーダーチャート（種目バランス）</div>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">📊 全国平均との比較</div>
        <div class="chart-sub">
          種目：
          <select id="compareEvent" class="chart-sel" onchange="renderCompare()">
            <option>50m走</option><option>長座体前屈</option><option>上体起こし</option>
            <option>シャトルラン</option><option>反復横跳び</option><option>立ち幅とび</option>
          </select>
        </div>
        <div class="chart-wrap"><canvas id="compareChart"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">📈 記録推移</div>
        <div class="chart-sub">
          種目：
          <select id="trendEvent" class="chart-sel" onchange="renderTrend()">
            <option>50m走</option><option>長座体前屈</option><option>上体起こし</option>
            <option>シャトルラン</option><option>反復横跳び</option><option>立ち幅とび</option>
          </select>
        </div>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchSection('input',this)">
      <span class="nav-icon">✏️</span>入力
    </button>
    <button class="nav-item" onclick="switchSection('list',this)">
      <span class="nav-icon">📋</span>記録
    </button>
    <button class="nav-item" onclick="switchSection('chart',this)">
      <span class="nav-icon">📊</span>グラフ
    </button>
  </nav>
</div>

<!-- RESET MODAL -->
<div class="modal-bg" id="resetModal">
  <div class="modal">
    <h3>⚠️ 自分の記録をリセット</h3>
    <p>あなたの全記録を削除します。<br>この操作は取り消せません。</p>
    <div class="modal-actions">
      <button class="btn-full danger" onclick="doReset()">リセットする</button>
      <button class="btn-full" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
//  ★ユーザー設定（名前とパスワードを書き換えてください）
// ============================================================
const USERS = [
  { name: 'あけさか', password: 'akesaka'   },
  { name: 'いぐち', password: 'iguchi'   },
  { name: 'えんどう', password: 'endo'   },
  { name: 'おか', password: 'oka'  },
  { name: 'しまざき', password: 'shimazaki'  },
  { name: 'しみず', password: 'shimizu' },
  { name: 'つつみ', password: 'tsutsumi' },
  { name: 'はぎの', password: 'hagino'     },
  { name: 'はやし', password: 'hayashi'  },
];

// ============================================================
//  ★GASのURLをここに入れる
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx04-Cpc56-GsGMcROQpVcGVAsuqWQzCwFyA89fm84EZoPIbuLJbnvmNiU88ebiyF1VUQ/exec';

// ============================================================
//  全国平均（文科省 令和4年度）
// ============================================================
const NATIONAL_AVG = {
  '50m走':      { male: { '20-24歳':7.18,'25-29歳':7.25,'30-34歳':7.39,'35-39歳':7.55,'40-44歳':7.74,'45-49歳':7.96,'50-54歳':8.24,'55-59歳':8.55,'60-64歳':8.92 }, female: { '20-24歳':8.60,'25-29歳':8.76,'30-34歳':8.96,'35-39歳':9.18,'40-44歳':9.42,'45-49歳':9.69,'50-54歳':10.02,'55-59歳':10.40,'60-64歳':10.89 }, unit:'秒', lib:false },
  '長座体前屈':  { male: { '20-24歳':46.7,'25-29歳':46.4,'30-34歳':45.6,'35-39歳':44.8,'40-44歳':44.0,'45-49歳':43.1,'50-54歳':42.0,'55-59歳':41.0,'60-64歳':39.9 }, female: { '20-24歳':51.8,'25-29歳':51.2,'30-34歳':50.5,'35-39歳':49.7,'40-44歳':48.8,'45-49歳':47.8,'50-54歳':46.6,'55-59歳':45.3,'60-64歳':43.8 }, unit:'cm', lib:true },
  '上体起こし':  { male: { '20-24歳':29.2,'25-29歳':28.3,'30-34歳':26.8,'35-39歳':25.2,'40-44歳':23.5,'45-49歳':21.8,'50-54歳':19.8,'55-59歳':17.8,'60-64歳':15.8 }, female: { '20-24歳':22.1,'25-29歳':21.2,'30-34歳':20.0,'35-39歳':18.7,'40-44歳':17.2,'45-49歳':15.6,'50-54歳':13.8,'55-59歳':12.1,'60-64歳':10.5 }, unit:'回', lib:true },
  'シャトルラン':{ male: { '20-24歳':68.1,'25-29歳':63.8,'30-34歳':59.2,'35-39歳':54.2,'40-44歳':49.2,'45-49歳':44.2,'50-54歳':39.1,'55-59歳':33.8,'60-64歳':28.8 }, female: { '20-24歳':46.0,'25-29歳':42.4,'30-34歳':38.8,'35-39歳':35.0,'40-44歳':31.2,'45-49歳':27.5,'50-54歳':23.9,'55-59歳':20.4,'60-64歳':17.2 }, unit:'回', lib:true },
  '反復横跳び':  { male: { '20-24歳':57.1,'25-29歳':56.2,'30-34歳':54.8,'35-39歳':53.0,'40-44歳':51.0,'45-49歳':48.8,'50-54歳':46.4,'55-59歳':43.7,'60-64歳':40.8 }, female: { '20-24歳':48.7,'25-29歳':47.8,'30-34歳':46.4,'35-39歳':44.8,'40-44歳':43.1,'45-49歳':41.2,'50-54歳':38.9,'55-59歳':36.5,'60-64歳':33.9 }, unit:'点', lib:true },
  '立ち幅とび':  { male: { '20-24歳':217.0,'25-29歳':213.1,'30-34歳':207.8,'35-39歳':201.4,'40-44歳':194.7,'45-49歳':187.6,'50-54歳':179.5,'55-59歳':170.5,'60-64歳':161.2 }, female: { '20-24歳':168.9,'25-29歳':165.7,'30-34歳':161.4,'35-39歳':156.6,'40-44歳':151.5,'45-49歳':146.0,'50-54歳':139.9,'55-59歳':133.4,'60-64歳':126.7 }, unit:'cm', lib:true },
};
const EVENTS = Object.keys(NATIONAL_AVG);
const ICONS  = { '50m走':'🏃','長座体前屈':'🧘','上体起こし':'💪','シャトルラン':'🔄','反復横跳び':'↔️','立ち幅とび':'🦘' };

// ============================================================
//  ユーティリティ
// ============================================================
function getNatAvg(ev, sex, age) {
  const d = NATIONAL_AVG[ev]; if (!d) return null;
  return d[sex==='男子'?'male':'female'][age] ?? null;
}
function getRank(ev, sex, age, val) {
  const avg = getNatAvg(ev, sex, age); if (!avg) return '-';
  const lib = NATIONAL_AVG[ev].lib;
  const r   = val / avg;
  return lib ? (r>=1.20?'A':r>=1.08?'B':r>=0.93?'C':r>=0.80?'D':'E')
             : (r<=0.85?'A':r<=0.93?'B':r<=1.07?'C':r<=1.18?'D':'E');
}
function getScore(ev, sex, age, val) {
  const avg = getNatAvg(ev, sex, age); if (!avg) return 50;
  const pct = (val - avg) / avg * 100;
  return Math.max(0, Math.min(100, 50 + (NATIONAL_AVG[ev].lib ? pct : -pct)));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ============================================================
//  認証
// ============================================================
let currentUser = null;

function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pw   = document.getElementById('loginPw').value;
  const user = USERS.find(u => u.name === name && u.password === pw);
  if (user) {
    currentUser = user.name;
    sessionStorage.setItem('user', currentUser);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('headerUser').textContent = currentUser + ' さん';
    initApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() { sessionStorage.removeItem('user'); location.reload(); }

// ============================================================
//  データ（ログイン中のユーザー分のみ）
// ============================================================
let records    = [];
let activeEvent = '全種目';
let radarInst=null, compareInst=null, trendInst=null;

function localKey() { return 'tairyoku_' + currentUser; }

async function loadRecords() {
  try { const c = localStorage.getItem(localKey()); if(c) records = JSON.parse(c); } catch(e) {}
  if (GAS_URL !== 'YOUR_GAS_URL_HERE') {
    try {
      const res = await fetch(GAS_URL + '?action=getUser&user=' + encodeURIComponent(currentUser));
      records = await res.json();
      localStorage.setItem(localKey(), JSON.stringify(records));
    } catch(e) { console.warn('GAS接続失敗、ローカルデータ使用'); }
  }
  renderAll();
}

function saveLocal() { localStorage.setItem(localKey(), JSON.stringify(records)); }

async function gasPost(body) {
  if (GAS_URL === 'YOUR_GAS_URL_HERE') return;
  try {
    await fetch(GAS_URL, { method:'POST', body: JSON.stringify(body), headers:{'Content-Type':'text/plain'} });
  } catch(e) {}
}

// ============================================================
//  初期化
// ============================================================
function initApp() {
  buildEventChips();
  loadRecords();
}

function renderAll() {
  renderList();
  renderStats();
}

// ============================================================
//  種目チップ
// ============================================================
function buildEventChips() {
  const wrap = document.getElementById('eventChips');
  wrap.innerHTML = ['全種目', ...EVENTS].map(ev =>
    `<button class="event-chip${ev===activeEvent?' active':''}"
      onclick="setEvent('${ev}',this)">${ICONS[ev]||'📋'} ${ev}</button>`
  ).join('');
}

function setEvent(ev, btn) {
  activeEvent = ev;
  document.querySelectorAll('.event-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ============================================================
//  記録一覧
// ============================================================
function renderList() {
  const list = document.getElementById('recList');
  const data = activeEvent==='全種目' ? records : records.filter(r=>r.event===activeEvent);
  if (!data.length) {
    list.innerHTML = `<div class="empty-msg"><div class="empty-icon">📭</div>記録がありません</div>`;
    return;
  }
  list.innerHTML = [...data].reverse().map(r => {
    const rank = getRank(r.event, r.sex, r.age, r.record);
    const avg  = getNatAvg(r.event, r.sex, r.age);
    const unit = NATIONAL_AVG[r.event].unit;
    const lib  = NATIONAL_AVG[r.event].lib;
    const diff = avg ? (r.record - avg) / avg * 100 : null;
    const diffStr   = diff!==null ? (diff>=0?'+':'')+diff.toFixed(1)+'%' : '';
    const diffColor = diff===null ? '' : (lib?(diff>=0?'color:#16a34a':'color:#dc2626'):(diff<=0?'color:#16a34a':'color:#dc2626'));
    return `<div class="rec-card">
      <div class="rec-rank rank-${rank}">${rank}</div>
      <div class="rec-info">
        <div class="rec-event">${ICONS[r.event]} ${r.event}</div>
        <div class="rec-meta">${r.sex}・${r.age}</div>
        <div class="rec-meta">${r.datetime}</div>
      </div>
      <div class="rec-right">
        <div class="rec-value">${r.record}</div>
        <div class="rec-unit">${unit}</div>
        ${avg?`<div class="rec-avg" style="${diffColor}">平均比 ${diffStr}</div>`:''}
      </div>
      <button class="rec-del" onclick="delRecord('${r.id}')">🗑</button>
    </div>`;
  }).join('');
}

// ============================================================
//  追加・削除
// ============================================================
async function addRecord() {
  const sex    = document.getElementById('f-sex').value;
  const age    = document.getElementById('f-age').value;
  const event  = document.getElementById('f-event').value;
  const record = parseFloat(document.getElementById('f-record').value);
  if (isNaN(record)) { showToast('記録を入力してください'); return; }

  const btn = document.getElementById('addBtn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

  const rec = {
    id: Date.now().toString(),
    user: currentUser, sex, age, event, record,
    datetime: new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
  };
  records.push(rec);
  saveLocal();
  await gasPost({ action:'add', record: rec });
  renderAll();
  document.getElementById('f-record').value = '';
  showToast('✓ 記録を追加しました');
  btn.innerHTML = '＋ 追加する'; btn.disabled = false;
}

async function delRecord(id) {
  records = records.filter(r=>r.id!==id);
  saveLocal();
  await gasPost({ action:'delete', id });
  renderAll();
  showToast('削除しました');
}

// ============================================================
//  統計
// ============================================================
function renderStats() {
  const total = records.length;
  const rankA = records.filter(r=>getRank(r.event,r.sex,r.age,r.record)==='A').length;
  const evCount = new Set(records.map(r=>r.event)).size;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">総記録数</div></div>
    <div class="stat-card"><div class="stat-num">${evCount}</div><div class="stat-lbl">種目数</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#16a34a">${rankA}</div><div class="stat-lbl">Aランク数</div></div>
  `;
}

// ============================================================
//  グラフ
// ============================================================
function renderCharts() {
  renderRadar(); renderCompare(); renderTrend();
}

function renderRadar() {
  const ctx = document.getElementById('radarChart').getContext('2d');
  if (radarInst) radarInst.destroy();
  if (!records.length) return;
  radarInst = new Chart(ctx, {
    type:'radar',
    data:{
      labels: EVENTS,
      datasets:[{
        label: currentUser,
        data: EVENTS.map(ev => {
          const recs = records.filter(r=>r.event===ev);
          if (!recs.length) return 0;
          const last = recs[recs.length-1];
          return getScore(ev, last.sex, last.age, last.record);
        }),
        borderColor:'#2563eb', backgroundColor:'#2563eb22',
        pointBackgroundColor:'#2563eb', pointRadius:4,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{ r:{ min:0, max:100, ticks:{stepSize:25,font:{size:9}}, pointLabels:{font:{family:'Noto Sans JP',size:10}} }},
      plugins:{ legend:{ display:false }}
    }
  });
}

function renderCompare() {
  const ctx = document.getElementById('compareChart').getContext('2d');
  if (compareInst) compareInst.destroy();
  const ev   = document.getElementById('compareEvent').value;
  const data = records.filter(r=>r.event===ev);
  if (!data.length) return;
  const last = data[data.length-1];
  const avg  = getNatAvg(ev, last.sex, last.age);
  if (!avg) return;
  const unit = NATIONAL_AVG[ev].unit;
  compareInst = new Chart(ctx, {
    type:'bar',
    data:{
      labels:['自分の記録', '全国平均'],
      datasets:[{ data:[last.record, avg], backgroundColor:['#2563eb','#94a3b8'], borderRadius:8, barThickness:56 }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        y:{ beginAtZero:false, ticks:{callback:v=>v+unit} },
        x:{ grid:{display:false} }
      }
    }
  });
}

function renderTrend() {
  const ctx  = document.getElementById('trendChart').getContext('2d');
  if (trendInst) trendInst.destroy();
  const ev   = document.getElementById('trendEvent').value;
  const data = records.filter(r=>r.event===ev);
  if (!data.length) return;
  const unit = NATIONAL_AVG[ev].unit;
  const RCOLORS = {A:'#22c55e',B:'#2563eb',C:'#f59e0b',D:'#f97316',E:'#ef4444'};
  trendInst = new Chart(ctx, {
    type:'bar',
    data:{
      labels: data.map(r=>r.datetime.replace(/\//g,'/').split(' ')[0]),
      datasets:[{
        label: ev,
        data: data.map(r=>r.record),
        backgroundColor: data.map(r=>RCOLORS[getRank(r.event,r.sex,r.age,r.record)]),
        borderRadius:6,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        y:{ beginAtZero:false, ticks:{callback:v=>v+unit} },
        x:{ grid:{display:false}, ticks:{font:{size:10}} }
      }
    }
  });
}

// ============================================================
//  ナビ
// ============================================================
function switchSection(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='chart') { renderStats(); renderCharts(); }
  if (name==='list')  { buildEventChips(); renderList(); }
}

// ============================================================
//  リセット（自分の記録のみ）
// ============================================================
function confirmReset() { document.getElementById('resetModal').classList.add('open'); }
function closeModal()   { document.getElementById('resetModal').classList.remove('open'); }
async function doReset() {
  records = [];
  saveLocal();
  await gasPost({ action:'resetUser', user: currentUser });
  renderAll();
  closeModal();
  showToast('自分の記録をリセットしました');
}

// ============================================================
//  起動
// ============================================================
window.onload = () => {
  const saved = sessionStorage.getItem('user');
  if (saved) {
    currentUser = saved;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('headerUser').textContent = currentUser + ' さん';
    initApp();
  }
};
</script>
</body>
</html>
